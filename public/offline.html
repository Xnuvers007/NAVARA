<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline — Begal Alert</title>
  <link rel="icon" href="/assets/icons/icon-512.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0d1117;color:#e6edf3;
         display:flex;align-items:center;justify-content:center;
         min-height:100vh;text-align:center;padding:24px}
    .wrap{max-width:400px}
    .icon{font-size:72px;margin-bottom:24px}
    h1{font-size:24px;font-weight:700;margin-bottom:12px;color:#ef4444}
    p{color:#8b949e;line-height:1.6;margin-bottom:24px}
    a{display:inline-block;padding:12px 28px;background:#ef4444;color:white;
      text-decoration:none;border-radius:12px;font-weight:600;
      transition:.2s;font-size:14px}
    a:hover{background:#dc2626}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">📡</div>
    <h1>Tidak Ada Koneksi</h1>
    <p>Anda sedang offline. Hubungkan ke internet untuk melihat peta dan melaporkan kejadian.</p>
    <a href="/">Coba Lagi</a>
  </div>
</body>
</html>
